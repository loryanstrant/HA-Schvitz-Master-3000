start_session:
  name: Start session
  description: Start a sauna session (warm-up → rounds → breaks → end).
  fields:
    target:
      name: Sauna
      description: >-
        Optional sauna slug or config entry ID. Omit if you only have one sauna.
      required: false
      example: sauna
      selector:
        text:
    rounds:
      name: Rounds
      description: Number of rounds (times you sit) this session.
      required: false
      example: 2
      selector:
        number: { min: 1, max: 6, step: 1, mode: box }
    round_minutes:
      name: Round minutes
      required: false
      example: 15
      selector:
        number: { min: 3, max: 30, step: 1, mode: box, unit_of_measurement: min }
    break_minutes:
      name: Break minutes
      required: false
      example: 8
      selector:
        number: { min: 2, max: 30, step: 1, mode: box, unit_of_measurement: min }
    media_player:
      name: Media player
      required: false
      selector:
        entity: { domain: media_player }
    playlist:
      name: Playlist
      description: Music Assistant media id / URI to play.
      required: false
      example: library://playlist/84
      selector:
        text:

end_session:
  name: End session
  description: End the current session and run teardown.
  fields:
    target:
      name: Sauna
      required: false
      example: sauna
      selector:
        text:
    reason:
      name: Reason
      required: false
      default: manual
      selector:
        text:

next_round:
  name: Next round
  description: Advance to the next round or break immediately.
  fields:
    target:
      name: Sauna
      required: false
      example: sauna
      selector:
        text:

extend_round:
  name: Extend round
  description: Add minutes to the current round or break.
  fields:
    target:
      name: Sauna
      required: false
      example: sauna
      selector:
        text:
    minutes:
      name: Minutes
      required: false
      default: 5
      selector:
        number: { min: 1, max: 30, step: 1, mode: box, unit_of_measurement: min }

set_rounds:
  name: Set rounds
  description: Change the number of rounds for the session.
  fields:
    target:
      name: Sauna
      required: false
      example: sauna
      selector:
        text:
    rounds:
      name: Rounds
      required: true
      example: 2
      selector:
        number: { min: 1, max: 6, step: 1, mode: box }

skip_warmup:
  name: Skip warm-up
  description: Stop waiting for warm-up and begin round 1.
  fields:
    target:
      name: Sauna
      required: false
      example: sauna
      selector:
        text:

log_water:
  name: Log water
  description: Manually add water to the current session total.
  fields:
    target:
      name: Sauna
      required: false
      example: sauna
      selector:
        text:
    volume:
      name: Volume
      required: true
      example: 250
      selector:
        number: { min: 1, max: 5000, step: 1, mode: box, unit_of_measurement: mL }
    unit:
      name: Unit
      required: false
      default: mL
      selector:
        select:
          options: [mL, L, fl_oz]

apply_profile:
  name: Apply profile
  description: Apply a built-in session profile (sets rounds and durations).
  fields:
    target:
      name: Sauna
      required: false
      example: sauna
      selector:
        text:
    profile:
      name: Profile
      required: true
      example: Classic 2×15
      selector:
        text:
