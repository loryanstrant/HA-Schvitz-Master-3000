blueprint:
  name: Schvitz Master — panel button controls
  description: >-
    Map ESPHome sauna-panel button presses to Schvitz Master 3000 services, for
    panels that expose their buttons as HA entities (rather than calling services
    directly from firmware).
  domain: automation
  input:
    start_button:
      name: Start button
      description: Button entity that starts a session.
      default: {}
      selector:
        entity:
          domain: [button, binary_sensor, event]
    stop_button:
      name: Stop button
      default: {}
      selector:
        entity:
          domain: [button, binary_sensor, event]
    next_button:
      name: Next round button
      default: {}
      selector:
        entity:
          domain: [button, binary_sensor, event]
    target:
      name: Sauna target
      description: Sauna slug or config entry id (leave blank if you only have one).
      default: ""
      selector:
        text:

mode: queued
triggers:
  - trigger: state
    entity_id: !input start_button
    id: start
  - trigger: state
    entity_id: !input stop_button
    id: stop
  - trigger: state
    entity_id: !input next_button
    id: next
conditions:
  - condition: template
    value_template: "{{ trigger.to_state.state not in ['unavailable', 'unknown', none] }}"
actions:
  - choose:
      - conditions: "{{ trigger.id == 'start' }}"
        sequence:
          - action: schvitz_master.start_session
            data: { target: !input target }
      - conditions: "{{ trigger.id == 'stop' }}"
        sequence:
          - action: schvitz_master.end_session
            data: { target: !input target }
      - conditions: "{{ trigger.id == 'next' }}"
        sequence:
          - action: schvitz_master.next_round
            data: { target: !input target }
